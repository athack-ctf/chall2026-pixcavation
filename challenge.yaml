# challenge.yaml MUST be placed at the root of the challenge repo.

# Challenge Name (for single flag challenges)
name: "Pixcavation"

# Author name
author: "Anis"

# "Web", "AI", "Crypto", "Forensics", "Hardware", "OSINT", "Pwn", "Rev", "Stegano", "Misc", "Physical"
category: "Misc"

# DO NOT remove the vertical character "|" (aka pipe character)
description: |
  Today, you're an archaeologist desperate to uncover a buried scripture.

  The scripture here is a random text concealed beneath a grid of dirty pixels. 

  You gotta clean enough pixels to read the scripture and earn the flag.

  [Start your challenge instance](https://instancer.athackctf.com/chall2026-pixcavation/create)

# The field connection_info is used to provide a link, hostname, or instructions on how to connect to a challenge

# Uncomment for online challs
# connection_info: "nc localhost <port> # port provided by Boundary"
# connection_info: "telnet localhost <port> # port provided by Boundary"
connection_info: "http://localhost:<port> # port provided by Boundary"

flags:
  - type: "static"
    content: "ATHACKCTF{youtu.be/KcOQfYlyIqw?Bonus}"
    data: "case_insensitive"

# List all files you distributed with the challenge (all should be placed within ./offline-artifacts/)
# files:
#   - ./offline-artifacts/file1.zip
#   - ./offline-artifacts/file2.zip

# Do not use any tag outside what's listed bellow
tags:
  # Indicates that this challenge is deemed beginner-friendly
  # - beginner
  # Indicates that this challenge is sponsored
  - sponsored
  # Indicates that this challenge is exclusive to a specific bracket
  # - exclusive-beginner
  # - exclusive-regular

# Scoring (we'll be using dynamic scoring everywhere!)
type: dynamic
# Mandatory (make it equal to the minimum value for consistency)
value: 500
# Parameters of dynamic scoring
extra:
  # Maximum points
  initial: 500
  # Minimum points after decay
  minimum: 50
  # Number of solves to reach minimum (75% of expect number of active teams form both brackets)
  decay: 20
  # We'll stick exclusively to logarithmic
  function: linear

# Challs will be hidden at first
state: visible

version: "0.1"
